<div class="grid grid-cols-3 gap-4">
  <div class="kpi-card">
    <div class="text-xs text-slate-500 uppercase">{{ period_label }} disallowed loss</div>
    <div class="text-2xl font-mono text-confirmed mt-1">${{ "%.2f"|format(period_disallowed) }}</div>
  </div>
  <div class="kpi-card">
    <div class="text-xs text-slate-500 uppercase">{{ period_label }} violations</div>
    <div class="text-2xl font-mono text-ink mt-1">{{ period_count }}</div>
  </div>
  <div class="kpi-card">
    <div class="text-xs text-slate-500 uppercase">Open watch-list items</div>
    <div class="text-2xl font-mono text-ink mt-1">{{ open_violations|length }}</div>
  </div>
</div>
