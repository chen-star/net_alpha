<div class="grid grid-cols-3 gap-4">
  <div class="kpi-card">
    <div class="text-xs text-slate-500 uppercase">YTD disallowed loss</div>
    <div class="text-2xl font-mono text-confirmed mt-1">${{ "%.2f"|format(ytd_disallowed) }}</div>
  </div>
  <div class="kpi-card">
    <div class="text-xs text-slate-500 uppercase">YTD violations ({{ current_year }})</div>
    <div class="text-2xl font-mono text-ink mt-1">{{ ytd_count }}</div>
  </div>
  <div class="kpi-card">
    <div class="text-xs text-slate-500 uppercase">Open watch-list items</div>
    <div class="text-2xl font-mono text-ink mt-1">{{ open_violations|length }}</div>
  </div>
</div>
