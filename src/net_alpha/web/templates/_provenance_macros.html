{# Reusable macro: emit a small "info" affordance next to a number that opens
   the provenance modal. Caller supplies a MetricRef instance. #}

{% macro provenance_link(ref) -%}
  {%- set encoded = encode_metric_ref(ref) -%}
  <button type="button"
          class="provenance-trigger ml-1 inline-flex align-middle text-label-3 hover:text-text"
          aria-label="Why is this number what it is?"
          hx-get="/provenance/{{ encoded }}"
          hx-target="#provenance-dialog-body"
          hx-swap="innerHTML"
          onclick="document.getElementById('provenance-dialog').showModal()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
  </button>
{%- endmacro %}
