{% extends "base.html" %}
{% block title %}{{ title }} · net-alpha{% endblock %}
{% block content %}
  <div class="kpi-card text-center py-12">
    <div class="text-6xl font-mono text-confirmed mb-2">{{ status }}</div>
    <h1 class="text-2xl mb-3">{{ title }}</h1>
    <p class="text-slate-700 mb-4">{{ detail }}</p>
    {% if traceback %}
      <details class="text-left mt-4 text-xs">
        <summary class="cursor-pointer text-slate-500 hover:text-primary">Show traceback</summary>
        <pre class="bg-slate-100 rounded p-3 overflow-x-auto mt-2 font-mono whitespace-pre">{{ traceback }}</pre>
      </details>
    {% endif %}
    <a href="/" class="btn mt-4">Back to Dashboard</a>
  </div>
{% endblock %}
