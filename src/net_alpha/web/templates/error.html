{% extends "base.html" %}
{% block title %}{{ title }} · net-alpha{% endblock %}
{% block content %}
  <div class="panel text-center py-12">
    <div class="text-6xl font-mono text-confirmed mb-2 num">{{ status }}</div>
    <h1 class="text-2xl mb-3">{{ title }}</h1>
    <p class="text-label-2 mb-4">{{ detail }}</p>
    {% if traceback %}
      <details class="text-left mt-4 text-xs">
        <summary class="cursor-pointer text-label-3 hover:text-primary">Show traceback</summary>
        <pre class="bg-surface-2 rounded p-3 overflow-x-auto mt-2 font-mono whitespace-pre">{{ traceback }}</pre>
      </details>
    {% endif %}
    <a href="/" class="btn-ghost mt-4">← Back</a>
  </div>
{% endblock %}
