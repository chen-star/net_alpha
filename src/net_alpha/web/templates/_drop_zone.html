<div class="border-2 border-dashed rounded-lg p-8 text-center bg-surface"
     style="border-color: rgba(255,255,255,0.14);"
     id="drop-zone"
     hx-post="/imports/preview"
     hx-encoding="multipart/form-data"
     hx-trigger="change from:#csv-input"
     hx-include="#csv-input"
     hx-target="#import-modal-content"
     hx-swap="innerHTML"
     onclick="document.getElementById('csv-input').click()"
     ondragover="event.preventDefault(); this.classList.add('bg-surface-2');"
     ondragleave="this.classList.remove('bg-surface-2');"
     ondrop="event.preventDefault(); this.classList.remove('bg-surface-2');
             const dt = new DataTransfer();
             for (const f of event.dataTransfer.files) dt.items.add(f);
             const inp = document.getElementById('csv-input');
             inp.files = dt.files; inp.dispatchEvent(new Event('change', { bubbles: true }));
             document.getElementById('import-modal').classList.remove('hidden');">
  <p>Drop one or more Schwab CSVs here or <a class="text-primary underline cursor-pointer">click to browse</a></p>
  <p class="text-xs text-label-2 mt-1">Transaction History &middot; Realized G/L &middot; max 50 MB each</p>
  <input type="file" id="csv-input" name="files" accept=".csv" multiple class="hidden"
         onchange="document.getElementById('import-modal').classList.remove('hidden');"/>
</div>

<div id="import-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center"
     onclick="this.classList.add('hidden')">
  <div id="import-modal-content"></div>
</div>
