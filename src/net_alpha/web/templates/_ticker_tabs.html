{# Three-tab strip for /ticker/<sym> — mirrors _positions_tabs.html pattern. #}
<nav class="tabs mb-3" role="tablist" aria-label="Ticker views">
  {% set _tabs = [
    ('timeline', 'Timeline'),
    ('lots',     'Open lots'),
    ('recon',    'Broker reconciliation'),
  ] %}
  {% for key, label in _tabs %}
    <a href="/ticker/{{ symbol }}?view={{ key }}"
       class="tab{% if (selected_view|default('timeline')) == key %} tab--active{% endif %}"
       role="tab"
       id="ticker-tab-{{ key }}"
       aria-selected="{{ 'true' if (selected_view|default('timeline')) == key else 'false' }}"
       aria-controls="ticker-tab-content">
      {{ label }}
    </a>
  {% endfor %}
</nav>
