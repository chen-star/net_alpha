{# All positions — Phase 1 reuses the existing portfolio HTMX panels.
   Phase 2 adds row-action menus and the side pane. #}
{% if not imports %}
  {% include "_portfolio_empty_state.html" %}
{% else %}
  <div id="holdings-positions"
       hx-get="/portfolio/positions?period={{ selected_period }}&account={{ selected_account }}&group_options={{ group_options }}&show=open&page=1"
       hx-trigger="load" hx-swap="innerHTML"></div>

  <div id="holdings-options" class="panel mt-4"
       hx-get="/holdings/options?account={{ selected_account }}"
       hx-trigger="load" hx-swap="innerHTML"></div>
{% endif %}
