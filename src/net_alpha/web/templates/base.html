<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>{% block title %}net-alpha{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/alpine.min.js" defer></script>
</head>
<body class="min-h-screen flex flex-col">
  <header class="bg-white border-b border-slate-200">
    <nav class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-6">
      <a href="/" class="font-mono font-bold text-primary text-lg">net-alpha</a>
      <a href="/" class="text-sm text-slate-700 hover:text-primary">Portfolio</a>
      <a href="/calendar" class="text-sm text-slate-700 hover:text-primary">Calendar</a>
      <a href="/imports" class="text-sm text-slate-700 hover:text-primary">Imports</a>
      <a href="/sim" class="text-sm text-slate-700 hover:text-primary">Sim</a>
      <a href="/detail" class="text-sm text-slate-700 hover:text-primary">Detail</a>
    </nav>
  </header>

  <main class="flex-1 max-w-7xl w-full mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-white border-t border-slate-200 py-3">
    <div class="max-w-7xl mx-auto px-6 text-xs text-slate-500">
      {{ disclaimer }}
    </div>
  </footer>
</body>
</html>
