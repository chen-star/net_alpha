{# Options tab — single unified panel covering long + short options.
   /holdings/short-options is a backwards-compat alias for /holdings/options
   so we only render one fragment here to avoid duplicate tables. #}
{% if not imports %}
  {% include "_portfolio_empty_state.html" %}
{% else %}
  <div id="holdings-options" class="panel"
       hx-get="/holdings/options?account={{ selected_account }}"
       hx-trigger="load" hx-swap="innerHTML"></div>
{% endif %}
