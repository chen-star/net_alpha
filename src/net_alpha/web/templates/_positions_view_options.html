{# Options-only — Phase 1 shows just the open options panel via HTMX. #}
{% if not imports %}
  {% include "_portfolio_empty_state.html" %}
{% else %}
  <div id="holdings-options" class="panel"
       hx-get="/holdings/options?account={{ selected_account }}"
       hx-trigger="load" hx-swap="innerHTML"></div>

  <div id="holdings-short-options" class="panel mt-4"
       hx-get="/holdings/short-options?account={{ selected_account }}"
       hx-trigger="load" hx-swap="innerHTML"></div>
{% endif %}
