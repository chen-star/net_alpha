{% extends "base.html" %}
{% block title %}Calendar · net-alpha{% endblock %}
{% block content %}
  <h1 class="mb-4">Wash-sale calendar</h1>

  <form method="get" class="panel mb-4 flex gap-3 flex-wrap items-end">
    <div>
      <label class="label-uc block">Year</label>
      <select name="year" class="bg-surface text-text rounded-md px-2 py-1 text-[13px] font-mono" style="border:0.5px solid rgba(255,255,255,0.08);">
        {% for y in years %}
          <option value="{{ y }}" {% if y==selected_year %}selected{% endif %}>{{ y }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="label-uc block">Ticker</label>
      <input type="text" name="ticker" value="{{ filter_ticker }}" list="ticker-list" class="bg-surface text-text rounded-md px-2 py-1 text-[13px] font-mono w-32" style="border:0.5px solid rgba(255,255,255,0.08);"/>
      <datalist id="ticker-list">{% for t in tickers %}<option value="{{ t }}">{% endfor %}</datalist>
    </div>
    <div>
      <label class="label-uc block">Account</label>
      <input type="text" name="account" value="{{ filter_account }}" list="account-list" class="bg-surface text-text rounded-md px-2 py-1 text-[13px] w-40" style="border:0.5px solid rgba(255,255,255,0.08);"/>
      <datalist id="account-list">{% for a in accounts %}<option value="{{ a }}">{% endfor %}</datalist>
    </div>
    <div>
      <label class="label-uc block">Confidence</label>
      <select name="confidence" class="bg-surface text-text rounded-md px-2 py-1 text-[13px]" style="border:0.5px solid rgba(255,255,255,0.08);">
        <option value="">All</option>
        <option value="confirmed" {% if filter_confidence=='confirmed' %}selected{% endif %}>Confirmed</option>
        <option value="probable" {% if filter_confidence=='probable' %}selected{% endif %}>Probable</option>
        <option value="unclear" {% if filter_confidence=='unclear' %}selected{% endif %}>Unclear</option>
      </select>
    </div>
    <button type="submit" class="btn">Apply</button>
    <a href="/calendar" class="btn-ghost">Reset</a>
  </form>

  {% include "_calendar_pl_ribbon.html" %}
  {% include "_calendar_ribbon.html" %}

  <div id="focus-strip" class="mt-6"></div>
{% endblock %}
